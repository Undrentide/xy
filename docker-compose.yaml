version: '3.8'

name: xy
services:
  MySQL:
    image: mysql:latest
    ports:
      - "8099:3306"
    restart: always
    environment:
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./src/main/resources/sql/DDL.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data: